<!DOCTYPE html>
<html>
<head>
    <title>Tilted Sofia Background</title>
    <style>
        body {
            margin: 0;
            min-height: 200vh; /* enables scrolling */
            font-family: Arial, sans-serif;
            text-align: center;
            position: relative;
        }

        /* Background image layer */
        body::before {
            content: "";
            position: fixed;
            top: 50%;
            left: 50%;
            width: 400px;
            height: 400px;

            background-image: url("https://upload.wikimedia.org/wikipedia/en/3/37/Sofia_the_First.png");
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;

            transform: translate(-50%, -50%) skewX(8deg); /* tilt image */
            opacity: 0.9;
            z-index: -1; /* behind text */
        }

        h1 {
            margin-top: 50px;
        }

        p {
            width: 60%;
            margin: auto;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <h1>Princess Sofia Image</h1>

    <p>
        Scroll the page.  
        The Sofia image stays fixed in the middle and is tilted,  
        but the text remains normal.
    </p>

    <p style="margin-top:800px;">
        Extra content to enable scrolling.  
        The image does not move while scrolling.
    </p>

</body>
</html>
