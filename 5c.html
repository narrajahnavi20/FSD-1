 <!DOCTYPE html>
<html>
<head>
    <title>CSS Font and Text Properties</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .size {
            font-size: 28px;
        }

        .weight {
            font-weight: bold;
        }

        .style {
            font-style: italic;
        }

        .decoration {
            text-decoration: underline;
        }

        .transform {
            text-transform: uppercase;
        }

        .alignment {
            text-align: center;
            border: 2px solid black;
            padding: 10px;
        }
    </style>
</head>
<body>

    <h2 class="alignment">CSS Text Alignment (Centered)</h2>

    <p class="size">This text shows font-size property.</p>

    <p class="weight">This text shows font-weight property.</p>

    <p class="style">This text shows font-style property.</p>

    <p class="decoration">This text shows text-decoration property.</p>

    <p class="transform">This text shows text-transform property.</p>

</body>
</html>
