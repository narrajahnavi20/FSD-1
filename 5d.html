<!DOCTYPE html>
<html>
<head>
    <title>CSS Box Model</title>
    <style>
        .box {
            width: 300px;
            background-color: pink; 
            
            padding: 20px;   
            border: 5px solid purple; 
            margin: 90px;    
        }
    </style>
</head>
<body>

    <h2>CSS Box Model Demonstration</h2>

    <div class="box">
        This is the CONTENT area.<br>
        Padding creates space inside the box.<br>
        Border surrounds the padding.<br>
        Margin creates space outside the border.
    </div>

</body>
</html>
