 <!DOCTYPE html>
<html>
<head>
    <title>Internal and External JavaScript</title>

    <!-- External JavaScript -->
    <script src="script.js"></script>

    <!-- Internal JavaScript -->
    <script>
        function internalMessage() {
            document.getElementById("internal").innerHTML =
                "This message is from INTERNAL JavaScript.";
        }
    </script>
</head>
<body>

    <h2>JavaScript Demo</h2>

    <button onclick="internalMessage()">Show Internal JS Message</button>
    <p id="internal"></p>

    <button onclick="externalMessage()">Show External JS Message</button>
    <p id="external"></p>

</body>
</html>
