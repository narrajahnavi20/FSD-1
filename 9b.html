<!DOCTYPE html>
<html>
<head>
    <title>Number Operations</title>
    <script>
        function getValue() {
            return parseInt(document.getElementById("num").value);
        }

        function factorial() {
            let n = getValue();
            let fact = 1;

            for (let i = 1; i <= n; i++) {
                fact *= i;
            }

            document.getElementById("result").innerHTML = "Factorial: " + fact;
        }

        function fibonacci() {
            let n = getValue();
            let a = 0, b = 1, temp;
            let series = "";

            for (let i = 0; i < n; i++) {
                series += a + " ";
                temp = a + b;
                a = b;
                b = temp;
            }

            document.getElementById("result").innerHTML = "Fibonacci: " + series;
        }

        function prime() {
            let n = getValue();
            let primes = "";

            for (let i = 2; i <= n; i++) {
                let isPrime = true;

                for (let j = 2; j <= Math.sqrt(i); j++) {
                    if (i % j === 0) {
                        isPrime = false;
                        break;
                    }
                }

                if (isPrime) {
                    primes += i + " ";
                }
            }

            document.getElementById("result").innerHTML = "Primes: " + primes;
        }

        function palindrome() {
            let n = document.getElementById("num").value;
            let rev = n.split("").reverse().join("");

            if (n === rev) {
                document.getElementById("result").innerHTML = n + " is a Palindrome";
            } else {
                document.getElementById("result").innerHTML = n + " is NOT a Palindrome";
            }
        }
    </script>
</head>

<body>
    <h2>Number Operations</h2>

    Enter a number:
    <input type="text" id="num"><br><br>

    <button onclick="factorial()">Factorial</button>
    <button onclick="fibonacci()">Fibonacci</button>
    <button onclick="prime()">Prime</button>
    <button onclick="palindrome()">Palindrome</button>

    <h3 id="result"></h3>
</body>
</html>
